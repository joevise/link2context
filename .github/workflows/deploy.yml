name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 67.209.190.54
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/link2context

            if [ ! -d .git ]; then
              cd /opt
              rm -rf link2context
              git clone https://github.com/joevise/link2context.git
              cd link2context
            else
              git pull origin main
            fi

            docker compose down 2>/dev/null || true
            docker compose up -d --build
            docker compose ps
