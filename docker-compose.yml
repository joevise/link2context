services:
  link2context:
    build: .
    container_name: link2context
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - image_cache:/app/cache/images
    environment:
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  image_cache:
